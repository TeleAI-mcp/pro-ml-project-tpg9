name: Issue Comment Bot

on:
  issues:
    types: [labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Check label and comment
        env:
          LABEL: ${{ github.event.label.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$LABEL" = "documentation" ]; then
            COMMENT="Thank you for flagging this documentation issue. We will update it soon."
          elif [ "$LABEL" = "enhancement" ]; then
            COMMENT="Thanks for the enhancement suggestion! We appreciate your input."
          elif [ "$LABEL" = "bug" ]; then
            COMMENT="Thank you for reporting this bug. Our team will investigate and fix it."
          else
            echo "No matching label, skipping comment."
            exit 0
          fi
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments \
            -d "{\"body\": \"$COMMENT\"}"
